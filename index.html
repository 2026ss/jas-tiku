<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JAS产品知识加强培训</title>
<script defer src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script defer src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#f5f5f7;--card:#fff;--primary:#2563eb;--primary-light:#eff6ff;--accent:#f59e0b;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;--radius:14px;--radius-sm:10px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);--shadow-md:0 4px 6px rgba(0,0,0,0.06),0 2px 4px rgba(0,0,0,0.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);min-height:100dvh;color:var(--text);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
.container{max-width:600px;margin:0 auto;padding:14px}

.header{text-align:center;padding:18px 0 10px}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.header .badge-row{display:flex;justify-content:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-amber{background:#fef3c7;color:#b45309}
.badge-gray{background:#f1f5f9;color:#64748b}

.upload-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.btn-upload{font-size:11px;padding:5px 12px;border-radius:6px;border:1px dashed var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-upload:active{background:#f1f5f9}

.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.filter-chip{font-size:11px;padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;font-weight:500;transition:all 0.15s;white-space:nowrap;color:var(--text2)}
.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.filter-chip:active{transform:scale(0.96)}

.search-section{margin-bottom:10px}
.search-wrap{display:flex;align-items:center;background:var(--card);border-radius:var(--radius);padding:3px 3px 3px 12px;box-shadow:var(--shadow-md);gap:6px;border:2px solid transparent;transition:border-color 0.2s}
.search-wrap:focus-within{border-color:var(--primary)}
.search-input{flex:1;border:none;outline:none;font-size:15px;padding:9px 0;background:transparent;font-family:inherit;color:var(--text);min-width:0}
.search-input::placeholder{color:#cbd5e1}
.btn-icon{width:34px;height:34px;border-radius:8px;border:none;background:#f1f5f9;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;color:#64748b}
.btn-icon:active{background:#e2e8f0;transform:scale(0.94)}
.btn-icon.ocr{background:#eff6ff;color:var(--primary)}
.btn-icon svg{width:17px;height:17px}

.results-area{min-height:200px}
.result-item{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);animation:fadeIn 0.2s ease;cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;-webkit-tap-highlight-color:transparent}
.result-item:active{background:#f8fafc}
.result-item.expanded{border-left-color:var(--primary);box-shadow:var(--shadow-md)}
.result-item .q-text{font-size:14px;line-height:1.5;font-weight:500}
.result-item .q-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.result-item .q-meta span{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.meta-single{background:#dbeafe;color:#1d4ed8}
.meta-multi{background:#fef3c7;color:#b45309}
.meta-cat{background:#f1f5f9;color:#64748b}
.result-item .answer-box{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.result-item.expanded .answer-box{display:block}
.answer-line{font-size:14px;padding:7px 10px;background:#f0fdf4;border-radius:8px;margin-bottom:3px;line-height:1.4;color:#166534}
.answer-line:last-child{margin-bottom:0}

.prompt{text-align:center;padding:40px 16px;color:var(--text2)}
.prompt svg{width:36px;height:36px;margin-bottom:8px;opacity:0.25}
.prompt p{font-size:13px}

.ocr-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center}
.ocr-modal{background:#fff;border-radius:var(--radius);padding:22px;margin:16px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.ocr-spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
.ocr-progress{height:4px;background:#e2e8f0;border-radius:2px;margin:10px 0;overflow:hidden}
.ocr-progress-bar{height:100%;background:var(--primary);border-radius:2px;transition:width 0.3s;width:0%}
.ocr-status{font-size:12px;color:var(--text2)}
.ocr-cancel{margin-top:10px;font-size:13px;padding:7px 18px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:inherit}
.ocr-result-text{font-size:12px;background:#f8fafc;padding:8px;border-radius:8px;margin-top:8px;max-height:70px;overflow-y:auto;text-align:left;display:none}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);pointer-events:none;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:400px){.container{padding:8px}.header h1{font-size:18px}.search-input{font-size:14px}.result-item .q-text{font-size:13px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>JAS产品知识加强培训</h1>
<div class="badge-row">
<span class="badge badge-blue" id="totalBadge">190题</span>
<span class="badge badge-amber">单选+多选</span>
<span class="badge badge-gray">5大品类</span>
</div>
</div>

<div class="upload-row">
<span>题库：已内置 190 题 |</span>
<button class="btn-upload" id="btnUpload">📎 上传新题库</button>
<input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none">
<input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none">
</div>

<div class="filter-row" id="filterRow">
<button class="filter-chip active" data-cat="all">全部</button><button class="filter-chip" data-cat="全品类5954">全品类</button><button class="filter-chip" data-cat="头发护理5852">头发护理</button><button class="filter-chip" data-cat="织物护理5851">织物护理</button><button class="filter-chip" data-cat="口腔护理5878">口腔护理</button><button class="filter-chip" data-cat="综合">综合</button>
</div>

<div class="search-section">
<div class="search-wrap">
<input type="text" class="search-input" id="searchInput" placeholder="输入题目关键词（支持模糊搜索）..." autocomplete="off">
<button class="btn-icon ocr" id="ocrBtn" title="拍照识题">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
</button>
<button class="btn-icon" id="clearBtn" title="清除" style="display:none">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
</button>
</div>
</div>

<div class="results-area" id="resultsArea">
<div class="prompt" id="promptBox">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
<p>输入关键词搜索题目，或点 📷 拍照识别</p>
</div>
</div>
</div>

<div class="ocr-overlay" id="ocrOverlay">
<div class="ocr-modal">
<div class="ocr-spinner" id="ocrSpinner"></div>
<div class="ocr-progress"><div class="ocr-progress-bar" id="ocrProgressBar"></div></div>
<div class="ocr-status" id="ocrStatus">正在加载识别引擎...</div>
<div class="ocr-result-text" id="ocrResultText"></div>
<button class="ocr-cancel" id="ocrCancel">取消</button>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
var BANK = [], bankReady = false, pendingQuery = null;
fetch('questions.json?v=20260710').then(function(r){return r.json();}).then(function(d){BANK=d;bankReady=true;buildFilters();if(pendingQuery){onSearch();}}).catch(function(e){document.getElementById('resultsArea').innerHTML='<div style="text-align:center;padding:40px 0;color:#ef4444"><p>题库加载失败，请检查网络后刷新</p></div>';console.error(e);});
function onSearch() {
  if (!bankReady) { pendingQuery = true; return; }
  var val = document.getElementById('searchInput').value;
  document.getElementById('clearBtn').style.display = val ? '' : 'none';
  renderResults(search(val), val);
}
var ocrWorker = null, ocrLoading = false, ocrCancelled = false;
var currentCat = 'all';

function fuzzyMatch(query, text) {
  var q = query.toLowerCase().replace(/\s+/g, '');
  var t = text.toLowerCase().replace(/\s+/g, '');
  if (t.indexOf(q) !== -1) return 100;
  var qi = 0;
  for (var i = 0; i < t.length; i++) {
    if (q[qi] === t[i]) qi++;
    if (qi >= q.length) return Math.round(80 * qi / q.length);
  }
  return Math.round(60 * qi / q.length);
}

function search(query) {
  if (!query || !query.trim()) return [];
  var q = query.trim();
  var results = [];
  for (var i = 0; i < BANK.length; i++) {
    var item = BANK[i];
    if (currentCat !== 'all' && item.category !== currentCat) continue;
    var score = fuzzyMatch(q, item.q);
    if (score >= 30) results.push({item: item, score: score, idx: i});
  }
  results.sort(function(a, b) { return b.score - a.score; });
  return results;
}

function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderResults(results, query) {
  var area = document.getElementById('resultsArea');
  var prompt = document.getElementById('promptBox');
  if (!prompt) {
    // Recreate promptBox if destroyed by innerHTML
    prompt = document.createElement('div');
    prompt.id = 'promptBox';
    prompt.className = 'prompt';
    prompt.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p></p>';
    area.appendChild(prompt);
  }
  if (!results || results.length === 0) {
    area.innerHTML = '';
    area.appendChild(prompt);
    prompt.style.display = '';
    prompt.querySelector('p').textContent = query ? '没有匹配的题目，换个关键词试试' : '输入关键词搜索题目，或点 📷 拍照识别';
    return;
  }
  prompt.style.display = 'none';
  var html = '';
  for (var i = 0; i < Math.min(results.length, 30); i++) {
    var r = results[i], item = r.item;
    var typeCls = item.type === '多选' ? 'meta-multi' : 'meta-single';
    var answersHtml = '';
    for (var a = 0; a < item.answers.length; a++) {
      answersHtml += '<div class="answer-line">' + (item.answers.length > 1 ? '<b>A' + (a+1) + '：</b>' : '') + escapeHtml(item.answers[a]) + '</div>';
    }
    html += '<div class="result-item" data-idx="' + r.idx + '" onclick="toggleAnswer(this)">' +
      '<div class="q-text">' + highlightMatch(item.q, query) + '</div>' +
      '<div class="q-meta">' +
        '<span class="' + typeCls + '">' + item.type + '</span>' +
        '<span class="meta-cat">' + escapeHtml(item.category) + '</span>' +
      '</div>' +
      '<div class="answer-box">' + answersHtml + '</div>' +
    '</div>';
  }
  if (results.length > 30) html += '<div style="text-align:center;padding:10px;font-size:12px;color:var(--text2)">仅显示前30条，更多结果请精确搜索</div>';
  area.innerHTML = html;
  area.scrollIntoView({behavior:'smooth',block:'start'});
}

function highlightMatch(text, query) {
  if (!query) return escapeHtml(text);
  var q = query.replace(/\s+/g, '');
  var result = '';
  var ti = 0, tlower = text.toLowerCase();
  for (var i = 0; i < text.length; i++) {
    if (ti < q.length && tlower[i] === q[ti].toLowerCase()) {
      result += '<mark style="background:#fef08a;padding:1px 2px;border-radius:2px">' + escapeHtml(text[i]) + '</mark>';
      ti++;
    } else {
      result += escapeHtml(text[i]);
    }
  }
  return result;
}

function toggleAnswer(el) {
  var wasExpanded = el.classList.contains('expanded');
  var all = document.querySelectorAll('.result-item.expanded');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('expanded');
  if (!wasExpanded) el.classList.add('expanded');
}

function buildFilters() {
  var cats = {'all': true};
  for (var i = 0; i < BANK.length; i++) cats[BANK[i].category] = true;
  var names = Object.keys(cats);
  names.sort();
  var row = document.getElementById('filterRow');
  var dNames = {'all': '全部', '综合': '综合', '头发护理5852': '头发护理', '织物护理5851': '织物护理', '全品类5954': '全品类'};
  var html = '';
  for (var n = 0; n < names.length; n++) {
    var c = names[n];
    html += '<button class="filter-chip' + (c === 'all' ? ' active' : '') + '" data-cat="' + c + '">' + (dNames[c] || c) + '</button>';
  }
  row.innerHTML = html;
  var chips = row.querySelectorAll('.filter-chip');
  for (var j = 0; j < chips.length; j++) {
    chips[j].addEventListener('click', function() {
      var allChips = document.getElementById('filterRow').querySelectorAll('.filter-chip');
      for (var k = 0; k < allChips.length; k++) allChips[k].classList.remove('active');
      this.classList.add('active');
      currentCat = this.dataset.cat;
      onSearch();
    });
  }
}



document.getElementById('searchInput').addEventListener('input', onSearch);
document.getElementById('searchInput').addEventListener('focus', function() { if (this.value) onSearch(); });
document.getElementById('clearBtn').addEventListener('click', function() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  var area = document.getElementById('resultsArea');
  area.innerHTML = '<div class="prompt" id="promptBox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>输入关键词搜索题目，或点 📷 拍照识别</p></div>';
  currentCat = 'all';
  var chips = document.querySelectorAll('.filter-chip');
  for (var k = 0; k < chips.length; k++) chips[k].classList.remove('active');
  if (chips.length > 0) chips[0].classList.add('active');
});

// OCR
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.classList.remove('show'); }, 2000);
}

document.getElementById('ocrBtn').addEventListener('click', function() {
  document.getElementById('imageInput').click();
});

document.getElementById('imageInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  this.value = '';
  if (!file.type.match(/image\//)) { showToast('请选择图片文件'); return; }
  doOCR(file);
});

function doOCR(file) {
  ocrCancelled = false;
  var overlay = document.getElementById('ocrOverlay');
  var spinner = document.getElementById('ocrSpinner');
  var bar = document.getElementById('ocrProgressBar');
  var status = document.getElementById('ocrStatus');
  var resultText = document.getElementById('ocrResultText');
  overlay.style.display = 'flex';
  spinner.style.display = 'block';
  bar.style.width = '0%';
  status.textContent = '正在加载识别引擎...';
  resultText.style.display = 'none';

  function startRecognize() {
    if (ocrCancelled) return;
    status.textContent = '正在识别文字...';
    bar.style.width = '10%';
    ocrWorker.recognize(file).then(function(result) {
      if (ocrCancelled) return;
      var text = (result.data.text || '').trim();
      spinner.style.display = 'none';
      bar.style.width = '100%';
      if (!text) { status.textContent = '未识别到文字，请重试'; return; }
      resultText.textContent = text;
      resultText.style.display = 'block';
      status.textContent = '识别完成，正在匹配...';
      setTimeout(function() {
        closeOCR();
        document.getElementById('searchInput').value = text;
        document.getElementById('clearBtn').style.display = '';
        var results = search(text);
        if (results.length === 0) {
          var lines = text.split(/\n+/).filter(function(l) { return l.trim().length > 3; });
          if (lines.length > 0) {
            document.getElementById('searchInput').value = lines[0];
            results = search(lines[0]);
          }
        }
        renderResults(results.length > 0 ? results : [], text);
        if (results.length === 0) showToast('未匹配到题目，可修改关键词再搜');
      }, 300);
    }).catch(function(err) {
      if (ocrCancelled) return;
      spinner.style.display = 'none';
      status.textContent = '识别失败，请重试';
      showToast('OCR识别失败');
    });
  }

  if (ocrWorker) { startRecognize(); return; }
  if (ocrLoading) {
    var check = setInterval(function() {
      if (ocrWorker) { clearInterval(check); startRecognize(); }
      if (ocrCancelled) clearInterval(check);
    }, 200);
    return;
  }
  ocrLoading = true;
  Tesseract.createWorker('chi_sim+eng', 1, {
    logger: function(m) {
      if (m.status === 'recognizing text') {
        bar.style.width = Math.round(10 + m.progress * 80) + '%';
        status.textContent = '正在识别文字...';
      } else status.textContent = m.status;
    }
  }).then(function(w) {
    ocrWorker = w;
    ocrLoading = false;
    if (!ocrCancelled) startRecognize();
  }).catch(function(err) {
    ocrLoading = false;
    if (!ocrCancelled) {
      status.textContent = '引擎加载失败: ' + err.message;
      spinner.style.display = 'none';
    }
  });
}

function closeOCR() {
  ocrCancelled = true;
  document.getElementById('ocrOverlay').style.display = 'none';
}
document.getElementById('ocrCancel').addEventListener('click', closeOCR);

// Upload
document.getElementById('btnUpload').addEventListener('click', function() { document.getElementById('fileInput').click(); });
document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  this.value = '';
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
      var newBank = [];
      for (var s = 0; s < wb.SheetNames.length; s++) {
        var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[s]], {header: 1, defval: ''});
        if (!rows || rows.length === 0) continue;
        var h = 0;
        for (var r = 0; r < Math.min(4, rows.length); r++) {
          for (var c = 0; c < rows[r].length; c++) {
            if (String(rows[r][c]).indexOf('题目') !== -1) { h = r; break; }
          }
          if (h > 0) break;
        }
        var qCol = 0, typeCol = -1, aCols = [];
        var headerRow = rows[h];
        for (var ci = 0; ci < headerRow.length; ci++) {
          var ch = String(headerRow[ci]).toLowerCase();
          if (ch.indexOf('题目') !== -1 || ch.indexOf('问题') !== -1) qCol = ci;
          if (ch.indexOf('类型') !== -1 || ch.indexOf('题型') !== -1) typeCol = ci;
          if (ch.indexOf('答案') !== -1) aCols.push(ci);
        }
        if (aCols.length === 0) aCols = [1];
        var cat = wb.SheetNames[s] === 'Sheet1' ? '综合' : wb.SheetNames[s];
        for (var ri = h + 1; ri < rows.length; ri++) {
          var row = rows[ri], q = String(row[qCol] || '').trim();
          q = q.replace(/^(单选|多选)\s*/i, '');
          var answers = [];
          for (var ai = 0; ai < aCols.length; ai++) {
            var ans = String(row[aCols[ai]] || '').trim();
            if (ans && ans !== 'nan') answers.push(ans);
          }
          if (!q || answers.length === 0) continue;
          var qType = answers.length > 1 ? '多选' : '单选';
          if (typeCol >= 0) {
            var t = String(row[typeCol] || '');
            if (t.indexOf('多') !== -1) qType = '多选';
            else if (t.indexOf('单') !== -1) qType = '单选';
          }
          newBank.push({q: q, type: qType, answers: answers, category: cat});
        }
      }
      if (newBank.length === 0) { showToast('未识别到题库数据'); return; }
      BANK = newBank;
      document.getElementById('totalBadge').textContent = BANK.length + '题';
      buildFilters();
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').style.display = 'none';
